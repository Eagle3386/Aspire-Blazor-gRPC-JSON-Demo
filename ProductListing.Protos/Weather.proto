syntax = "proto3";
package weather;
option csharp_namespace = "ProductListing.Protos"; // Optional, used for when namespace shall not be derived from package name.

import "google/protobuf/timestamp.proto";

service WeatherForecasts {
  rpc GetWeatherForecasts (GetWeatherForecastsRequest) returns (GetWeatherForecastsResponse);
}

message GetWeatherForecastsResponse {
  // An example of a summarizing comment for a message's property.
  repeated WeatherForecast forecasts = 1;
}

// An exameple of a summarizing
message GetWeatherForecastsRequest {
  int32 returnCount = 1;
}

message WeatherForecast {
  // NOTE: Builtin extension methods 'ToDateTime()' & 'ToTimestamp()' can be used for de-/serializing to C# / ProtoBuf.
  google.protobuf.Timestamp date = 1;
  int32 temperatureC = 2;
  string summary = 3;
}
